<!DOCTYPE html>
<html>
<body>
    <!-- (A) HTML -->
    <!-- (A1) ORIGINAL IMAGE -->
    <h1>Original Image (300 X 277)</h1>
    <img src="corgi.png"/>

    <!-- (A2) RESIZE USING CANVAS -->
    <h1>Resized Image (50%)</h1>
    <canvas id="resized"></canvas>

    <!-- (B) JAVASCRIPT RESIZE -->
    <script>
    // (B1) NEW IMAGE OBJECT
    var img = new Image();

    // (B2) RESIZE ON IMAGE LOAD
    img.onload = () => {
      // NEW DIMENSIONS
      let width = Math.floor(img.width * 0.5),
          height = Math.floor(img.height * 0.5);

      // DRAW ONTO CANVAS
      let canvas = document.getElementById("resized"),
          ctx = canvas.getContext("2d");
      canvas.width = width;
      canvas.height = height;
      ctx.drawImage(img, 0, 0, width, height);
    };

    // (B3) GO!
    img.src = "corgi.png";
    </script>
</body>
</html>
